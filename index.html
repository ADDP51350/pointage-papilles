<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pointage — Aux Délices des Papilles</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #FFF8F0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 32px 24px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo {
      font-size: 22px;
      font-weight: 900;
      color: #F4A724;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 13px;
      color: #999;
      margin-bottom: 28px;
    }
    .status {
      font-size: 15px;
      color: #555;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .btn {
      display: inline-block;
      background: #F4A724;
      color: white;
      font-size: 16px;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      margin-top: 8px;
    }
    .error { color: #E05252; font-weight: 600; }
    .success { color: #4CAF50; font-weight: 600; }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid #F4A724;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Aux Délices des Papilles</div>
  <div class="subtitle">Système de pointage</div>
  <div id="content">
    <div class="spinner"></div>
    <div class="status">Vérification de votre position...</div>
  </div>
</div>

<script>
  const RESTAURANT_LAT = 49.21297865213944;
  const RESTAURANT_LNG = 4.04969726735617;
  const RAYON_METRES = 100;
  const TALLY_URL = "https://tally.so/r/2E1kAp";

  function getDistance(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLng/2) * Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function showError(msg) {
    document.getElementById("content").innerHTML = `
      <div class="status error">⛔ ${msg}</div>
    `;
  }

  function showForm() {
    document.getElementById("content").innerHTML = `
      <div class="status success">✅ Vous êtes bien au restaurant.</div>
      <a class="btn" href="${TALLY_URL}" target="_blank">👉 Pointer ma présence</a>
    `;
  }

  if (!navigator.geolocation) {
    showError("La géolocalisation n'est pas disponible sur cet appareil.");
  } else {
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        const dist = getDistance(
          pos.coords.latitude,
          pos.coords.longitude,
          RESTAURANT_LAT,
          RESTAURANT_LNG
        );
        if (dist <= RAYON_METRES) {
          showForm();
        } else {
          showError("Vous n'êtes pas détecté au restaurant.<br>Pointage impossible à distance.");
        }
      },
      function(err) {
        showError("Impossible d'accéder à votre position.<br>Vérifiez les autorisations de votre téléphone.");
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }
</script>
</body>
</html>
